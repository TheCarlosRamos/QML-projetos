<!DOCTYPE html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1f2937;
    }
    
    .header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 0;
    }
    
    .header__inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .brand img {
      height: 32px;
      width: auto;
    }
    
    .brand strong {
      font-size: 1.125rem;
      font-weight: 700;
      color: #1f2937;
    }
    
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    .section {
      background: white;
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    
    .section h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #111827;
    }
    
    .mapwrap {
      position: relative;
      height: 600px;
      border-radius: 0.5rem;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    
    #map {
      width: 100%;
      height: 100%;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 600px;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 1rem;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: white;
      padding: 1.25rem;
      border-radius: 0.5rem;
      border: 1px solid #e5e7eb;
      text-align: center;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #1f40af;
      margin-bottom: 0.25rem;
    }
    
    .stat-label {
      font-size: 0.875rem;
      color: #6b7280;
    }

    (function() {
      const $ = (s, root = document) => root.querySelector(s);
      const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));
      
      let map = null;
      let markerClusterGroup = null;
      
      // Função para escapar HTML
      function esc(s) {
        return (s || '').toString().replace(/[&<>]/g, m => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;"
        }[m]));
      }
      
      // Inicializar o mapa
      function initMap() {
        if (typeof L === 'undefined') {
          $('#map').innerHTML = '<div class="loading">Mapa requer conexão para carregar a biblioteca Leaflet</div>';
          return;
        }
        
        // Criar o mapa centrado no Brasil
        map = L.map('map').setView([-14.2, -51.9], 4);
        
        // Adicionar camada de tiles do OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 18,
          attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        // Criar grupo de clustering
        if (window.L && L.markerClusterGroup) {
          markerClusterGroup = L.markerClusterGroup({
            chunkedLoading: true,
            chunkProgress: function(processed, total) {
              console.log(`Carregando marcadores: ${processed}/${total}`);
            }
          });
          map.addLayer(markerClusterGroup);
        } else {
          // Fallback sem clustering
          markerClusterGroup = L.layerGroup().addTo(map);
        }
      }
      
      // Carregar dados dos projetos (agora usa dados incorporados)
      function loadProjects() {
        try {
          const allProjects = PROJECTS_DATA;
          
          // Atualizar estatísticas
          $('#total-projects').textContent = allProjects.length.toLocaleString('pt-BR');
          
          const projectsWithCoords = allProjects.filter(p => {
            const lat = parseFloat(p.latitude);
            const lon = parseFloat(p.longitude);
            return !isNaN(lat) && !isNaN(lon);
          });
          
          $('#coords-projects').textContent = projectsWithCoords.length.toLocaleString('pt-BR');
          
          // Adicionar marcadores ao mapa
          addMarkersToMap(projectsWithCoords);
          
          // Ajustar visualização para mostrar todos os marcadores
          if (markerClusterGroup.getLayers && markerClusterGroup.getLayers().length > 0) {
            try {
              map.fitBounds(markerClusterGroup.getBounds(), { padding: [20, 20] });
            } catch (e) {
              console.warn('Não foi possível ajustar o zoom para mostrar todos os marcadores:', e);
            }
          }
          
          // Contar clusters (após algum tempo para garantir que foram processados)
          setTimeout(() => {
            try {
              const clusters = markerClusterGroup._featureGroup ? 
                markerClusterGroup._featureGroup.getLayers().length : 
                markerClusterGroup.getLayers().length;
              $('#clusters-count').textContent = clusters;
            } catch (e) {
              $('#clusters-count').textContent = 'N/A';
            }
          }, 2000);
          
        } catch (error) {
          console.error('Erro ao carregar projetos:', error);
          $('#map').innerHTML = '<div class="loading">Erro ao carregar dados dos projetos.</div>';
        }
      }
      
      // Adicionar marcadores ao mapa
      function addMarkersToMap(projects) {
        projects.forEach(project => {
          const lat = parseFloat(project.latitude);
          const lon = parseFloat(project.longitude);
          
          if (!isNaN(lat) && !isNaN(lon)) {
            const title = project.nome_completo || 'Projeto';
            const sector = project.setor || '';
            
            // Criar popup
            const popupContent = `
              <div style="min-width: 200px;">
                <strong>${esc(title)}</strong><br/>
                <small style="color: #6b7280;">${esc(sector)}</small>
                ${project.custo_estimado ? `<br/><small style="color: #059669;">Custo: ${formatCurrency(project.custo_estimado, project.moeda || 'BRL')}</small>` : ''}
              </div>
            `;
            
            // Criar marcador
            const marker = L.marker([lat, lon])
              .bindPopup(popupContent);
            
            // Adicionar ao grupo de clustering
            markerClusterGroup.addLayer(marker);
          }
        });
      }
      
      // Formatar moeda
      function formatCurrency(value, currency = 'BRL') {
        try {
          return new Intl.NumberFormat('pt-BR', {
            style: 'currency',
            currency: currency
          }).format(value);
        } catch (e) {
          return `${currency} ${Number(value).toLocaleString('pt-BR')}`;
        }
      }
      
      // Inicializar quando o DOM estiver pronto
      document.addEventListener('DOMContentLoaded', function() {
        initMap();
        loadProjects();
      });
      
    })();

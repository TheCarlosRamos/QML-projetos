<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PPI • Resumo por Subsetor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ppi.css" />
  <link rel="stylesheet" href="chatbot.css" />
  <style>
    .subsetor-header {
      background: linear-gradient(135deg, #1e40af 0%, #3730a3 100%);
      color: white;
      padding: 2rem 0;
      width: 100%;
    }
    .subsetor-header .header__inner {
      max-width: none;
      margin: 0;
      padding: 0;
      width: 100%;
    }
    .stats-container {
      display: flex;
      gap: 2rem;
      align-items: stretch;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .etapas-stats {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 2.5rem;
      border-radius: 1rem;
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
    }
    .etapas-stats h3 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .etapas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1.5rem;
      flex: 1;
    }
    .etapa-stat {
      background: rgba(255, 255, 255, 0.15);
      padding: 1.5rem;
      border-radius: 0.75rem;
      text-align: center;
    }
    .etapa-stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .etapa-stat-label {
      font-size: 0.85rem;
      opacity: 0.8;
    }
    .folhas-container {
      margin-top: 0;
    }
    .folha-section {
      margin-bottom: 1rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .folha-section .header__inner {
      max-width: none;
      margin: 0;
      padding: 0 2rem;
      width: 100%;
    }
    .section-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1f2937;
      margin: 3rem 0 1.5rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 3px solid #e5e7eb;
    }
    .section-title:first-child {
      margin-top: 0;
    }
    .favorites-section {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 2rem;
      margin: 2rem 0;
    }
    .favorites-empty {
      text-align: center;
      padding: 3rem;
      color: #6b7280;
    }
    .favorites-empty h3 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #374151;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: #6b7280;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top: 3px solid #1e40af;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .back-navigation {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 0;
      margin-bottom: 2rem;
    }
    .back-navigation .header__inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      text-decoration: none;
      color: #374151;
      font-weight: 500;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #e5e7eb;
    }
    .export-btn {
      padding: 0.5rem 1rem;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .export-btn:hover {
      background: #1e3a8a;
    }
    .subsetor-selector {
      background: white;
      padding: 1.5rem;
      border-radius: 1rem;
      margin-bottom: 2rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    .subsetor-selector select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      background: white;
    }
    .view-cards-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin: 1rem 0;
    }
    .view-cards-btn:hover {
      background: #059669;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
      background-color: white;
      margin: 0.5% auto;
      padding: 2rem;
      border-radius: 1rem;
      width: 99%;
      max-width: 1800px;
      max-height: 98vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #e5e7eb;
    }
    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f2937;
    }
    .close-modal {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
    }
    .close-modal:hover {
      background: #e5e7eb;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
      width: 100%;
      align-items: stretch; /* Garante que todos os cards tenham a mesma altura */
    }
    
    @media (min-width: 1200px) {
      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    @media (min-width: 1600px) {
      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    #modalCardsContainer .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
      width: 100%;
      align-items: stretch;
    }
    
    @media (min-width: 1400px) {
      #modalCardsContainer .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 1800px) {
      #modalCardsContainer .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 2200px) {
      #modalCardsContainer .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    .modal-navigation {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
    }
    .modal-nav-btn {
      background: #1e40af;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 500;
    }
    .modal-nav-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .modal-nav-btn:not(:disabled):hover {
      background: #1e3a8a;
    }
    .modal-info {
      text-align: center;
      color: #6b7280;
      font-size: 0.875rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <header class="back-navigation">
    <div class="header__inner">
      <nav>
        <a href="lista_projetos.html" class="back-btn">
          <span>←</span> Voltar para Lista
        </a>
      </nav>
      <button class="export-btn" onclick="exportToPDF()">
        <span>📄</span> Exportar Resumo
      </button>
    </div>
  </header>

  <div class="subsetor-selector">
    <div class="header__inner">
      <label for="subsetorSelect" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">
        Selecione o Subsetor:
      </label>
      <select id="subsetorSelect" onchange="changeSubsetor()">
        <option value="">Carregando subsetores...</option>
      </select>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Carregando dados dos subsetores...</p>
    </div>
  </div>

  <!-- Modal para visualização de cards -->
  <div id="cardsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Projetos do Subsetor</h2>
        <button class="close-modal" onclick="closeModal()">✕ Fechar</button>
      </div>
      <div class="modal-info" id="modalInfo">Mostrando projetos 1-15 de 0</div>
      <div id="modalCardsContainer" class="cards-grid">
        <!-- Cards serão inseridos aqui -->
      </div>
      <div class="modal-navigation">
        <button class="modal-nav-btn" id="prevBtn" onclick="changeModalPage(-1)" disabled>← Anterior</button>
        <button class="modal-nav-btn" id="nextBtn" onclick="changeModalPage(1)" disabled>Próximo →</button>
      </div>
    </div>
  </div>

  <!-- Modal para detalhes do projeto -->
  <div id="projectModal" class="modal">
    <div class="modal-content" style="max-width: 1200px; max-height: 90vh; overflow-y: auto; width: 95vw;">
      <div class="modal-header">
        <h2 class="modal-title" id="projectModalTitle">Detalhes do Projeto</h2>
        <button class="close-modal" onclick="closeProjectModal()">✕ Fechar</button>
      </div>
      <div id="projectModalContent">
        <!-- Conteúdo do projeto será inserido aqui -->
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Leaflet para mini-mapas -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-image@0.4.0/leaflet-image.js"></script>
  
  <script>
    // Funções utilitárias
    const $ = (s,root=document)=>root.querySelector(s);
    const $$ = (s,root=document)=>Array.from(root.querySelectorAll(s));
    
    function esc(text){
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Dicionário de traduções
    const translations = {
      // Subsetores
      'Highway': 'Rodovia',
      'Seaport': 'Porto Marítimo',
      'Intercity Rail': 'Ferrovia Intercidades',
      'School': 'Escola',
      'Solid Waste Facility': 'Instalação de Resíduos Sólidos',
      'Street Lighting': 'Iluminação Pública',
      'Other Water & Waste': 'Outros Água e Resíduos',
      'Other Energy': 'Outra Energia',
      'Other': 'Outros',
      
      // Subsetores adicionais que faltavam
      'Airport': 'Aeroporto',
      'Hospital': 'Hospital',
      'Housing': 'Habitação',
      'Irrigation': 'Irrigação',
      'Metro': 'Metrô',
      'Other Transport': 'Outro Transporte',
      'Prison': 'Penitenciária',
      'Tourist Facility': 'Instalação Turística',
      'Transmission Line': 'Linha de Transmissão',
      'Waste Water Treatment': 'Tratamento de Águas Residuais',
      'Water Supply Infrastructure': 'Infraestrutura de Abastecimento de Água',
      
      // Setores
      'Transport': 'Transporte',
      'Social Infrastructure': 'Infraestrutura Social',
      'Water & Waste': 'Água e Resíduos',
      'Urban Services': 'Serviços Urbanos',
      'Energy': 'Energia',
      
      // Outros termos
      'Completed': 'Concluído',
      'In Progress': 'Em Andamento',
      'Not Started': 'Não Iniciado',
      'Pending': 'Pendente',
      'Active': 'Ativo',
      'Inactive': 'Inativo',
      
      // Status e situações que podem aparecer
      'Em execução': 'Em execução',
      'Concluído': 'Concluído',
      'Paralisado': 'Paralisado',
      'Em andamento': 'Em andamento',
      'Planejado': 'Planejado',
      'Cancelado': 'Cancelado',
      'Suspenso': 'Suspenso'
    };

    // Função de tradução
    function translate(text) {
      if (!text) return text;
      return translations[text] || text;
    }
    
    function resumirDescricao(texto, maxCaracteres = 300) {
      if (!texto) return '';
      if (texto.length <= maxCaracteres) return texto;
      const cortado = texto.substring(0, maxCaracteres);
      const ultimoEspaco = cortado.lastIndexOf(' ');
      return (ultimoEspaco > maxCaracteres * 0.7) 
        ? cortado.substring(0, ultimoEspaco) + '...'
        : cortado + '...';
    }

    // Timeline de etapas (copiado do app.js)
    const phaseCols = [
      ['Estudos','status_dos_estudos'],['Consulta Pública','status_consulta_publica'],['TCU','status_do_tcu'],['Edital','status_do_edital'],['Leilão','status_do_leilao'],['Contrato','status_do_contrato']
    ];
    
    function lastCompletedIdx(rec){ 
      let last=-1; 
      for(let i=0;i<phaseCols.length;i++){ 
        const v=(rec[phaseCols[i][1]]||'').toString().toLowerCase(); 
        if(v.includes('conclu')||v.includes('completed')||v.includes('assinado')||v.includes('assinatura')) last=i;
      } 
      return last; 
    }
    
    function timelineHTML(rec){ 
      const states = phaseCols.map(_=>false); 
      const last = lastCompletedIdx(rec); 
      if(last >= 0){ 
        for(let i = 0; i <= last; i++) states[i] = true; 
      } 
      const completed = states.filter(Boolean).length; 
      const width = (completed/phaseCols.length*100).toFixed(2) + '%'; 
      
      const items = phaseCols.map((p, i) => {
        const isCompleted = states[i];
        const isCurrent = i === last + 1 && last >= 0;
        
        let statusClass = '';
        let statusIcon = '';
        let statusText = '';
        
        if (isCompleted) {
          statusClass = 'completed';
          statusIcon = '✓';
          statusText = 'Concluído';
        } else if (isCurrent) {
          statusClass = 'current';
          statusIcon = '';
          statusText = rec[phaseCols[i][1]] || 'Em andamento';
        } else {
          statusText = 'Pendente';
        }
        
        return `<div class="phase-item group" data-phase="${p[0].toLowerCase().replace(/\s+/g, '-')}" style="min-width: 40px;">
          <div class="phase-dot ${statusClass}" title="${p[0]}: ${statusText}" style="width: 12px; height: 12px; font-size: 8px;">
            ${statusIcon}
          </div>
          <div class="phase-label ${statusClass}" style="font-size: 8px; line-height: 1;">
            <span class="font-medium" style="font-size: 8px;">${p[0]}</span>
          </div>
        </div>`;
      }).join('');
      
      return `<div class="phase-timeline" style="height: 40px;">
        <div class="phase-line"></div>
        <div class="phase-line-completed" style="width: ${width}"></div>
        <div class="phase-items" style="display: flex; justify-content: space-between; align-items: flex-end; height: 100%;">${items}</div>
      </div>`;
    }

    // Template simplificado para resumo - apenas nome e timeline com favorito e clique para modal
    function cardTemplate(p){ 
      const nome = p.nome_completo || p.nome_projeto || 'Projeto';
      const isFavorite = favorites.includes(p.guid);
      
      return `<article class="card" style="padding: 0.8rem; min-height: 120px; display: flex; flex-direction: column; position: relative; cursor: pointer; width: 100%;" onclick="openProjectModal('${p.guid}')">
        <div style="flex: 0 0 auto; margin-bottom: 0.5rem;">
          <h3 style="color: #1f2937; font-size: 16px; margin: 0; font-weight: 700; line-height: 1.3;">${esc(nome)}</h3>
        </div>

        <div style="flex: 1 1 auto; display: flex; flex-direction: column; justify-content: flex-end;">
          <div style="transform: scale(0.75); transform-origin: top left; margin-left: -8px;">
            ${timelineHTML(p)}
          </div>
        </div>
        
        <!-- Botão de favorito na parte inferior -->
        <button onclick="event.stopPropagation(); toggleFavorite('${p.guid}')" style="position: absolute; bottom: 0.5rem; right: 0.5rem; background: ${isFavorite ? '#fbbf24' : 'rgba(255,255,255,0.2)'}; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="${isFavorite ? '#fff' : '#fff'}" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
      </article>`;
    }

    // Variáveis globais
    let allProjects = [];
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let currentSubsetor = '';
    let subsetores = [];
    let modalProjects = [];
    let currentModalPage = 0;
    let currentProjectsPage = 0;
    
    // Cards por página dinâmico baseado na largura da tela
    function getCardsPerPage() {
      const width = window.innerWidth;
      if (width >= 1600) return 18; // 3 colunas × 6 linhas
      if (width >= 1200) return 18; // 3 colunas × 6 linhas  
      return 15; // Auto-fit com 400px mínimo (aprox. 3 colunas × 5 linhas)
    }
    
    let CARDS_PER_PAGE = getCardsPerPage();
    
    // Atualizar quando redimensionar
    window.addEventListener('resize', () => {
      const newCardsPerPage = getCardsPerPage();
      if (newCardsPerPage !== CARDS_PER_PAGE) {
        CARDS_PER_PAGE = newCardsPerPage;
        if (currentSubsetor) {
          currentProjectsPage = 0;
          renderSubsetorContent();
        }
      }
    });

    // Inicialização
    document.addEventListener('DOMContentLoaded', async function() {
      await loadProjects();
      setupSubsetorSelector();
      if (subsetores.length > 0) {
        changeSubsetor();
      }
    });

    async function loadProjects() {
      try {
        const response = await fetch('data/projects_full.json');
        allProjects = await response.json();
        
        // Extrair subsetores únicos
        subsetores = [...new Set(allProjects.map(p => p.subsetor).filter(Boolean))].sort();
        console.log('Subsetores encontrados:', subsetores);
        console.log('Subsetores traduzidos:', subsetores.map(s => translate(s)));
        
      } catch (error) {
        console.error('Erro ao carregar projetos:', error);
        showError('Não foi possível carregar os projetos.');
      }
    }

    function setupSubsetorSelector() {
      const selector = document.getElementById('subsetorSelect');
      selector.innerHTML = '<option value="">Selecione um subsetor...</option>';
      
      subsetores.forEach(subsetor => {
        const option = document.createElement('option');
        option.value = subsetor;
        option.textContent = translate(subsetor); // Aplicar tradução
        selector.appendChild(option);
      });
      
      selector.addEventListener('change', changeSubsetor);
    }

    function changeSubsetor() {
      const selector = document.getElementById('subsetorSelect');
      currentSubsetor = selector.value;
      
      if (!currentSubsetor) {
        showEmpty();
        return;
      }
      
      renderSubsetorContent();
    }

    function renderSubsetorContent() {
      const content = document.getElementById('content');
      
      // Filtrar projetos do subsetor
      const subsetorProjects = allProjects.filter(p => p.subsetor === currentSubsetor);
      
      // Calcular estatísticas do subsetor completo (mesmo para todas as folhas)
      const subsetorStats = calculateStats(subsetorProjects);
      const subsetorEtapasStatsHtml = Object.entries(subsetorStats.etapasStats).map(([etapa, count]) => `
        <div class="etapa-stat">
          <div class="etapa-stat-value">${count}</div>
          <div class="etapa-stat-label">${translate(etapa)}</div>
        </div>
      `).join('');
      
      // Calcular número de folhas (slides)
      const totalFolhas = Math.ceil(subsetorProjects.length / CARDS_PER_PAGE);
      
      // Gerar HTML de todas as folhas azuis
      const folhasHtml = [];
      for (let folhaIndex = 0; folhaIndex < totalFolhas; folhaIndex++) {
        const startIndex = folhaIndex * CARDS_PER_PAGE;
        const endIndex = Math.min(startIndex + CARDS_PER_PAGE, subsetorProjects.length);
        const folhaProjects = subsetorProjects.slice(startIndex, endIndex);
        
        const projectsHtml = renderProjectsGrid(folhaProjects, 0); // Sem paginação individual
        
        // Todas as folhas usam as mesmas estatísticas do subsetor completo
        const statsSection = `
          <div class="stats-container" style="margin-bottom: 1.5rem;">
            <div class="etapas-stats">
              <h3>Projetos por Etapa</h3>
              <div class="etapas-grid">
                ${subsetorEtapasStatsHtml}
              </div>
            </div>
          </div>
        `;
        
        folhasHtml.push(`
          <div class="folha-section" style="background: linear-gradient(135deg, #1e40af 0%, #3730a3 100%); color: white; padding: 2rem 0; margin-bottom: 1rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
            <div class="header__inner">
              <div style="display: flex; gap: 2rem; align-items: flex-start;">
                ${statsSection}
                <section class="cards" aria-live="polite" style="flex: 1;">
                  ${projectsHtml}
                </section>
              </div>
            </div>
          </div>
        `);
      }
      
      // Adicionar folha de favoritos se houver projetos favoritados neste subsetor
      const subsetorFavorites = subsetorProjects.filter(p => favorites.includes(p.guid));
      if (subsetorFavorites.length > 0) {
        // Criar uma folha para cada projeto favorito com o card completo
        subsetorFavorites.forEach((project, index) => {
          // Gerar o card completo do projeto (mesmo estilo do projects.html)

    function calculateStats(projects) {
      const completed = projects.filter(p => {
        const lastIdx = lastCompletedIdx(p);
        return lastIdx === phaseCols.length - 1;
      }).length;
      
      const inProgress = projects.filter(p => {
        const lastIdx = lastCompletedIdx(p);
        return lastIdx >= 0 && lastIdx < phaseCols.length - 1;
      }).length;
      
      // Calcular estatísticas por etapa
      const etapasStats = {};
      phaseCols.forEach(([phaseName, statusField]) => {
        etapasStats[phaseName] = 0;
      });
      
      projects.forEach(project => {
        phaseCols.forEach(([phaseName, statusField]) => {
          const status = project[statusField];
          if (status && (
            status.toString().toLowerCase().includes('conclu') ||
            status.toString().toLowerCase().includes('completed') ||
            status.toString().toLowerCase().includes('assinado') ||
            status.toString().toLowerCase().includes('assinatura')
          )) {
            etapasStats[phaseName]++;
          }
        });
      });
      
      return {
        total: projects.length,
        favorites: projects.filter(p => favorites.includes(p.guid)).length,
        completed: completed,
        inProgress: inProgress,
        etapasStats: etapasStats
      };
    }

    // Inicializar mini-mapas (mesma lógica do app.js)
    function initMiniMaps() {
      if(typeof L === 'undefined') return;
      
      const level = window.LOC_LEVEL || 'state';
      const zoom = getZoomByLevel(level);

      document.querySelectorAll('.mini-map').forEach(async (el) => {
        const lat = parseFloat(el.getAttribute('data-lat'));
        const lon = parseFloat(el.getAttribute('data-lon'));
        if(isNaN(lat) || isNaN(lon)) return;

        // Limpa render anterior
        if(el._leaflet_map) { try { el._leaflet_map.remove(); } catch(e){} el._leaflet_map = null; }
        el.innerHTML = '';

        const map = L.map(el, {
          zoomControl: false,
          attributionControl: false
        }).setView([lat, lon], zoom);

        const tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 18,
          crossOrigin: true
        }).addTo(map);

        // --- IMPORTANTE: forçar renderer canvas no marcador
        const canvasRenderer = L.canvas({ padding: 0.5 });

        const marker = L.circleMarker([lat, lon], {
          renderer: canvasRenderer,
          radius: 6,
          color: '#1E40AF',
          weight: 2,
          fillColor: '#3B82F6',
          fillOpacity: 0.9
        }).addTo(map);

        // Aguarda o mapa terminar de desenhar
        await new Promise((resolve) => {
          // 'idle' nem sempre dispara em todas as combinações;
          // garantimos também um pequeno delay após 'load'
          let done = false;
          function finish(){ if(done) return; done = true; setTimeout(resolve, 60); }
          map.once('load', finish);
          tiles.once('load', finish);
          // fallback timeout
          setTimeout(finish, 500);
        });

        // Ajusta tamanhos e guarda instância
        map.invalidateSize(false);
        el._leaflet_map = map;

        const labelSpan = el.closest('.info-small')?.querySelector('.loc-level');
        if(labelSpan) labelSpan.textContent = level;
      });
    }

    // Congela todos os mapas dentro de um container de card (clone) em IMG estática (mesma lógica do app.js)
    async function freezeMapsForPDF(cardRoot){
      const maps = Array.from(cardRoot.querySelectorAll('.mini-map'));

      const tasks = maps.map((el) => new Promise((resolve) => {
        const map = el._leaflet_map;
        if(!map || typeof window.leafletImage !== 'function'){
          resolve();
          return;
        }

        // Coordenadas do ponto central (as mesmas do dataset do elemento)
        const lat = parseFloat(el.getAttribute('data-lat'));
        const lon = parseFloat(el.getAttribute('data-lon'));
        const hasPoint = !isNaN(lat) && !isNaN(lon);

        // Aguarda um tiquinho caso ainda haja draw pendente
        setTimeout(() => {
          try {
              window.leafletImage(map, function(err, canvas){
                if(err || !canvas){
                  resolve();
                  return;
                }

                // ---- Fallback: desenha a bolinha manualmente no canvas
                if(hasPoint){
                  const pt = map.latLngToContainerPoint([lat, lon]);
                  const ctx = canvas.getContext('2d');

                  // halo externo (borda)
                  ctx.beginPath();
                  ctx.arc(pt.x, pt.y, 7, 0, Math.PI * 2);
                  ctx.lineWidth = 3;
                  ctx.strokeStyle = '#1E40AF'; // azul escuro (borda)
                  ctx.stroke();

                  // preenchimento interno
                  ctx.beginPath();
                  ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
                  ctx.fillStyle = '#3B82F6'; // azul mais claro (preenchimento)
                  ctx.globalAlpha = 0.95;
                  ctx.fill();
                  ctx.globalAlpha = 1.0;
                }

                // Converte o canvas final para <img>
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/png');
                img.alt = 'Mapa estático';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.display = 'block';

                // Substitui o conteúdo
                el.innerHTML = '';
                el.appendChild(img);

                // Remove a instância do mapa
                try { map.remove(); } catch(e){}
                el._leaflet_map = null;

                resolve();
              });
          } catch (e) {
            resolve();
          }
        }, 40);
      }));

      await Promise.all(tasks);
    }

    function getZoomByLevel(level) {
      if(level === 'coords') return 13;        // coordenadas (mais perto)
      if(level === 'city') return 11;          // cidade
      return 9;                                // estado (padrão)
    }

      // Tentar novamente após um tempo para garantir que os favoritos foram renderizados
      setTimeout(() => {
        console.log('Tentativa adicional de renderização de mapas...');
        renderMiniMaps();
      }, 3000);
    }, 1000); // Reduzir tempo e não converter para imagem estática

    // Função auxiliar para capturar com html2canvas
    async function captureMapWithHTML2Canvas(el, lat, lon) {
      try {
        // Usar html2canvas para capturar o mapa
        const canvas = await html2canvas(el, {
          backgroundColor: '#ffffff',
          scale: 2,
          useCORS: true
        });
        
        // Desenhar marcador no centro se houver coordenadas
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // Halo externo (borda)
        ctx.beginPath();
        ctx.arc(centerX, centerY, 14, 0, Math.PI * 2);
        ctx.lineWidth = 6;
        ctx.strokeStyle = '#1E40AF';
        ctx.stroke();
        
        // Preenchimento interno
        ctx.beginPath();
        ctx.arc(centerX, centerY, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#3B82F6';
        ctx.globalAlpha = 0.95;
        ctx.fill();
        ctx.globalAlpha = 1.0;
        
        // Converter para imagem
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        img.alt = 'Mapa estático';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.display = 'block';
        
        // Substituir o conteúdo
        el.innerHTML = '';
        el.appendChild(img);
        
        // Remover instância do mapa
        if(el._leaflet_map) {
          try { el._leaflet_map.remove(); } catch(e){}
          el._leaflet_map = null;
        }
        
      } catch (err) {
        console.error('Erro ao capturar mapa:', err);
        // Fallback final: mostrar placeholder simples
        el.innerHTML = `
          <div style="background: #f0f0f0; height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
            <div style="text-align: center; color: #666;">
              <div style="font-size: 24px; margin-bottom: 8px;">📍</div>
              <div style="font-size: 12px;">${lat.toFixed(4)}, ${lon.toFixed(4)}</div>
              <div style="font-size: 10px; margin-top: 4px;">Localização</div>
            </div>
          </div>
        `;
      }
    }

    // Exportar para PDF
    async function exportToPDF() {
      if (!currentSubsetor) {
        alert('Selecione um subsetor primeiro.');
        return;
      }

      const pdf = new window.jspdf.jsPDF({
        orientation: 'landscape',
        unit: 'pt',
        format: 'a4'
      });

      // Adicionar capa
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      
      pdf.setFontSize(24);
      pdf.setTextColor(30, 64, 175);
      pdf.text(`Resumo - ${currentSubsetor}`, pageWidth/2, 60, { align: 'center' });
      
      pdf.setFontSize(14);
      pdf.setTextColor(107, 114, 128);
      pdf.text(`Gerado em ${new Date().toLocaleDateString('pt-BR')}`, pageWidth/2, 85, { align: 'center' });
      
      const subsetorProjects = allProjects.filter(p => p.subsetor === currentSubsetor);
      const favoriteProjects = subsetorProjects.filter(p => favorites.includes(p.guid));
      
      pdf.setFontSize(12);
      pdf.text(`Total: ${subsetorProjects.length} projetos | Favoritos: ${favoriteProjects.length}`, pageWidth/2, 105, { align: 'center' });
      
      pdf.addPage();

      // Capturar conteúdo principal
      const mainContent = document.querySelector('main');
      if (mainContent) {
        const canvas = await window.html2canvas(mainContent, { 
          scale: 1.5, 
          useCORS: true,
          allowTaint: true 
        });
        const imgData = canvas.toDataURL('image/png');
        
        const maxW = pageWidth * 0.9;
        const maxH = pageHeight * 0.9;
        let ratio = Math.min(maxW / canvas.width, maxH / canvas.height);
        let imgWidth = canvas.width * ratio;
        let imgHeight = canvas.height * ratio;
        
        let x = (pageWidth - imgWidth) / 2;
        let y = (pageHeight - imgHeight) / 2;
        
        pdf.addImage(imgData, 'PNG', x, y, imgWidth, imgHeight);
      }

      pdf.save(`resumo-${currentSubsetor.toLowerCase().replace(/\s+/g, '-')}-ppi.pdf`);
    }
  </script>

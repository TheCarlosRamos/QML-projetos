<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PPI • Resumo por Subsetor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ppi.css" />
  <link rel="stylesheet" href="chatbot.css" />
  <style>
    .subsetor-header {
      background: linear-gradient(135deg, #1e40af 0%, #3730a3 100%);
      color: white;
      padding: 2rem 0;
      width: 100%;
    }
    .main {
      padding: 2rem 0;
      width: 100%;
    }
    .main .header__inner {
      max-width: none;
      padding: 0 1rem;
      width: 100%;
    }
    .subsetor-header .header__inner {
      max-width: none;
      margin: 0 auto;
      padding: 0 1rem;
      width: 100%;
    }
    .subsetor-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .subsetor-subtitle {
      font-size: 1.25rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    .stats-container {
      display: flex;
      gap: 2rem;
      align-items: stretch;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .stats-row {
      display: flex;
      gap: 1rem;
      flex: 1;
      min-width: 0;
      flex-direction: column;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1.5rem;
      border-radius: 1rem;
      text-align: center;
      flex: 1;
      min-width: 140px;
      margin-bottom: 1rem;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .stat-label {
      font-size: 0.875rem;
      opacity: 0.8;
    }
    .etapas-stats {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 2rem;
      border-radius: 1rem;
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
    }
    .etapas-stats h3 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .etapas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
      flex: 1;
    }
    .etapa-stat {
      background: rgba(255, 255, 255, 0.15);
      padding: 1rem;
      border-radius: 0.75rem;
      text-align: center;
    }
    .etapa-stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .etapa-stat-label {
      font-size: 0.75rem;
      opacity: 0.8;
    }
    .section-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1f2937;
      margin: 3rem 0 1.5rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 3px solid #e5e7eb;
    }
    .section-title:first-child {
      margin-top: 0;
    }
    .favorites-section {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 2rem;
      margin: 2rem 0;
    }
    .favorites-empty {
      text-align: center;
      padding: 3rem;
      color: #6b7280;
    }
    .favorites-empty h3 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #374151;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: #6b7280;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top: 3px solid #1e40af;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .back-navigation {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 0;
      margin-bottom: 2rem;
    }
    .back-navigation .header__inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      text-decoration: none;
      color: #374151;
      font-weight: 500;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #e5e7eb;
    }
    .export-btn {
      padding: 0.5rem 1rem;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .export-btn:hover {
      background: #1e3a8a;
    }
    .subsetor-selector {
      background: white;
      padding: 1.5rem;
      border-radius: 1rem;
      margin-bottom: 2rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    .subsetor-selector select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      background: white;
    }
    .view-cards-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin: 1rem 0;
    }
    .view-cards-btn:hover {
      background: #059669;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
      background-color: white;
      margin: 0.5% auto;
      padding: 2rem;
      border-radius: 1rem;
      width: 99%;
      max-width: 1800px;
      max-height: 98vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #e5e7eb;
    }
    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f2937;
    }
    .close-modal {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
    }
    .close-modal:hover {
      background: #e5e7eb;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
      width: 100%;
      align-items: stretch; /* Garante que todos os cards tenham a mesma altura */
    }
    
    @media (min-width: 1200px) {
      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    @media (min-width: 1600px) {
      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    #modalCardsContainer .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
      width: 100%;
      align-items: stretch;
    }
    
    @media (min-width: 1400px) {
      #modalCardsContainer .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 1800px) {
      #modalCardsContainer .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 2200px) {
      #modalCardsContainer .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    .modal-navigation {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
    }
    .modal-nav-btn {
      background: #1e40af;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 500;
    }
    .modal-nav-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .modal-nav-btn:not(:disabled):hover {
      background: #1e3a8a;
    }
    .modal-info {
      text-align: center;
      color: #6b7280;
      font-size: 0.875rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <header class="back-navigation">
    <div class="header__inner">
      <nav>
        <a href="lista_projetos.html" class="back-btn">
          <span>←</span> Voltar para Lista
        </a>
      </nav>
      <button class="export-btn" onclick="exportToPDF()">
        <span>📄</span> Exportar Resumo
      </button>
    </div>
  </header>

  <div class="subsetor-selector">
    <div class="header__inner">
      <label for="subsetorSelect" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151;">
        Selecione o Subsetor:
      </label>
      <select id="subsetorSelect" onchange="changeSubsetor()">
        <option value="">Carregando subsetores...</option>
      </select>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Carregando dados dos subsetores...</p>
    </div>
  </div>

  <!-- Modal para visualização de cards -->
  <div id="cardsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Projetos do Subsetor</h2>
        <button class="close-modal" onclick="closeModal()">✕ Fechar</button>
      </div>
      <div class="modal-info" id="modalInfo">Mostrando projetos 1-15 de 0</div>
      <div id="modalCardsContainer" class="cards-grid">
        <!-- Cards serão inseridos aqui -->
      </div>
      <div class="modal-navigation">
        <button class="modal-nav-btn" id="prevBtn" onclick="changeModalPage(-1)" disabled>← Anterior</button>
        <button class="modal-nav-btn" id="nextBtn" onclick="changeModalPage(1)" disabled>Próximo →</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Leaflet para mini-mapas -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-image@0.4.0/leaflet-image.js"></script>
  
  <script>
    // Funções utilitárias
    const $ = (s,root=document)=>root.querySelector(s);
    const $$ = (s,root=document)=>Array.from(root.querySelectorAll(s));
    
    function esc(text){
      const div=document.createElement('div');
      div.textContent=text||'';
      return div.innerHTML;
    }
    
    function resumirDescricao(texto, maxCaracteres = 300) {
      if (!texto) return '';
      if (texto.length <= maxCaracteres) return texto;
      const cortado = texto.substring(0, maxCaracteres);
      const ultimoEspaco = cortado.lastIndexOf(' ');
      return (ultimoEspaco > maxCaracteres * 0.7) 
        ? cortado.substring(0, ultimoEspaco) + '...'
        : cortado + '...';
    }

    // Timeline de etapas (copiado do app.js)
    const phaseCols = [
      ['Estudos','status_dos_estudos'],['Consulta Pública','status_consulta_publica'],['TCU','status_do_tcu'],['Edital','status_do_edital'],['Leilão','status_do_leilao'],['Contrato','status_do_contrato']
    ];
    
    function lastCompletedIdx(rec){ 
      let last=-1; 
      for(let i=0;i<phaseCols.length;i++){ 
        const v=(rec[phaseCols[i][1]]||'').toString().toLowerCase(); 
        if(v.includes('conclu')||v.includes('completed')||v.includes('assinado')||v.includes('assinatura')) last=i;
      } 
      return last; 
    }
    
    function timelineHTML(rec){ 
      const states = phaseCols.map(_=>false); 
      const last = lastCompletedIdx(rec); 
      if(last >= 0){ 
        for(let i = 0; i <= last; i++) states[i] = true; 
      } 
      const completed = states.filter(Boolean).length; 
      const width = (completed/phaseCols.length*100).toFixed(2) + '%'; 
      
      const items = phaseCols.map((p, i) => {
        const isCompleted = states[i];
        const isCurrent = i === last + 1 && last >= 0;
        
        let statusClass = '';
        let statusIcon = '';
        let statusText = '';
        
        if (isCompleted) {
          statusClass = 'completed';
          statusIcon = '✓';
          statusText = 'Concluído';
        } else if (isCurrent) {
          statusClass = 'current';
          statusIcon = '';
          statusText = rec[phaseCols[i][1]] || 'Em andamento';
        } else {
          statusText = 'Pendente';
        }
        
        return `<div class="phase-item group" data-phase="${p[0].toLowerCase().replace(/\s+/g, '-')}" style="min-width: 40px;">
          <div class="phase-dot ${statusClass}" title="${p[0]}: ${statusText}" style="width: 12px; height: 12px; font-size: 8px;">
            ${statusIcon}
          </div>
          <div class="phase-label ${statusClass}" style="font-size: 8px; line-height: 1;">
            <span class="font-medium" style="font-size: 8px;">${p[0]}</span>
          </div>
        </div>`;
      }).join('');
      
      return `<div class="phase-timeline" style="height: 40px;">
        <div class="phase-line"></div>
        <div class="phase-line-completed" style="width: ${width}"></div>
        <div class="phase-items" style="display: flex; justify-content: space-between; align-items: flex-end; height: 100%;">${items}</div>
      </div>`;
    }

    // Template simplificado para resumo com altura garantida
    function cardTemplate(p){ 
      const nome = p.nome_completo || p.nome_projeto || 'Projeto';
      const setor = p.setor || '';
      const subsetor = p.subsetor || '';
      
      return `<article class="card" style="padding: 1rem; min-height: 200px; display: flex; flex-direction: column;">
        <div style="flex: 0 0 auto; margin-bottom: 0.75rem;">
          <p style="color: #6b7280; font-size: 11px; margin: 0 0 3px 0; line-height: 1.2;">${esc(setor)} • ${esc(subsetor)}</p>
          <h3 style="color: #1f2937; font-size: 14px; margin: 0; font-weight: 700; line-height: 1.3;">${esc(nome)}</h3>
        </div>

        <div style="flex: 1 1 auto; display: flex; flex-direction: column; justify-content: flex-end;">
          <h4 style="font-size: 12px; margin-bottom: 0.5rem; color: #374151;">ETAPA</h4>
          <div style="transform: scale(0.85); transform-origin: top left; margin-left: -5px;">
            ${timelineHTML(p)}
          </div>
        </div>
      </article>`;
    }

    // Variáveis globais
    let allProjects = [];
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let currentSubsetor = '';
    let subsetores = [];
    let modalProjects = [];
    let currentModalPage = 0;
    let currentProjectsPage = 0;
    
    // Cards por página dinâmico baseado na largura da tela
    function getCardsPerPage() {
      const width = window.innerWidth;
      if (width >= 1600) return 12; // 3 colunas × 4 linhas
      if (width >= 1200) return 12; // 3 colunas × 4 linhas  
      return 9; // Auto-fit com 400px mínimo (aprox. 3 colunas × 3 linhas)
    }
    
    let CARDS_PER_PAGE = getCardsPerPage();
    
    // Atualizar quando redimensionar
    window.addEventListener('resize', () => {
      const newCardsPerPage = getCardsPerPage();
      if (newCardsPerPage !== CARDS_PER_PAGE) {
        CARDS_PER_PAGE = newCardsPerPage;
        if (currentSubsetor) {
          currentProjectsPage = 0;
          renderSubsetorContent();
        }
      }
    });

    // Inicialização
    document.addEventListener('DOMContentLoaded', async function() {
      await loadProjects();
      setupSubsetorSelector();
      if (subsetores.length > 0) {
        changeSubsetor();
      }
    });

    async function loadProjects() {
      try {
        const response = await fetch('data/projects_full.json');
        allProjects = await response.json();
        
        // Extrair subsetores únicos
        subsetores = [...new Set(allProjects.map(p => p.subsetor).filter(Boolean))].sort();
        
      } catch (error) {
        console.error('Erro ao carregar projetos:', error);
        showError('Não foi possível carregar os projetos.');
      }
    }

    function setupSubsetorSelector() {
      const selector = document.getElementById('subsetorSelect');
      selector.innerHTML = '<option value="">Selecione um subsetor...</option>';
      
      subsetores.forEach(subsetor => {
        const option = document.createElement('option');
        option.value = subsetor;
        option.textContent = subsetor;
        selector.appendChild(option);
      });
    }

    function changeSubsetor() {
      const selector = document.getElementById('subsetorSelect');
      currentSubsetor = selector.value;
      
      if (!currentSubsetor) {
        showEmpty();
        return;
      }
      
      renderSubsetorContent();
    }

    function renderSubsetorContent() {
      const content = document.getElementById('content');
      
      // Filtrar projetos do subsetor
      const subsetorProjects = allProjects.filter(p => p.subsetor === currentSubsetor);
      
      // Resetar página atual dos projetos
      currentProjectsPage = 0;
      
      // Calcular estatísticas
      const stats = calculateStats(subsetorProjects);
      
      // Gerar HTML das estatísticas por etapa
      const etapasStatsHtml = Object.entries(stats.etapasStats).map(([etapa, count]) => `
        <div class="etapa-stat">
          <div class="etapa-stat-value">${count}</div>
          <div class="etapa-stat-label">${etapa}</div>
        </div>
      `).join('');
      
      // Renderizar projetos gerais paginados
      const projectsHtml = renderProjectsGrid(subsetorProjects, currentProjectsPage);
      
      content.innerHTML = `
        <header class="subsetor-header">
          <div class="header__inner">
            <h1 class="subsetor-title">${esc(currentSubsetor)}</h1>
            <p class="subsetor-subtitle">Resumo geral e projetos deste subsetor</p>
            
            <div class="stats-container">
              <div class="stats-row">
                <div class="stat-card">
                  <div class="stat-value">${stats.total}</div>
                  <div class="stat-label">Total de Projetos</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.favorites}</div>
                  <div class="stat-label">Favoritados</div>
                </div>
              </div>
              <div class="stats-row">
                <div class="stat-card">
                  <div class="stat-value">${stats.completed}</div>
                  <div class="stat-label">Concluídos</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.inProgress}</div>
                  <div class="stat-label">Em Andamento</div>
                </div>
              </div>

              <div class="etapas-stats">
                <h3>Projetos por Etapa</h3>
                <div class="etapas-grid">
                  ${etapasStatsHtml}
                </div>
              </div>
            </div>
          </div>
        </header>

        <main class="main">
          <div class="header__inner">
            <section id="grid" class="cards" aria-live="polite">
              ${projectsHtml}
            </section>
          </div>
        </main>
        
        ${subsetorProjects.length > CARDS_PER_PAGE ? `
          <div style="text-align: center; padding: 2rem 0; background: #f8fafc; border-top: 1px solid #e5e7eb;">
            <button class="modal-nav-btn" id="projectsPrevBtn" onclick="changeProjectsPage(-1)" disabled>← Anterior</button>
            <button class="modal-nav-btn" id="projectsNextBtn" onclick="changeProjectsPage(1)">Próximo →</button>
          </div>
        ` : ''}
      `;
      
      // Cards simplificados não precisam de inicialização de mapas
    }

    function calculateStats(projects) {
      const completed = projects.filter(p => {
        const lastIdx = lastCompletedIdx(p);
        return lastIdx === phaseCols.length - 1;
      }).length;
      
      const inProgress = projects.filter(p => {
        const lastIdx = lastCompletedIdx(p);
        return lastIdx >= 0 && lastIdx < phaseCols.length - 1;
      }).length;
      
      // Calcular estatísticas por etapa
      const etapasStats = {};
      phaseCols.forEach(([phaseName, statusField]) => {
        etapasStats[phaseName] = 0;
      });
      
      projects.forEach(project => {
        phaseCols.forEach(([phaseName, statusField]) => {
          const status = project[statusField];
          if (status && (
            status.toString().toLowerCase().includes('conclu') ||
            status.toString().toLowerCase().includes('completed') ||
            status.toString().toLowerCase().includes('assinado') ||
            status.toString().toLowerCase().includes('assinatura')
          )) {
            etapasStats[phaseName]++;
          }
        });
      });
      
      return {
        total: projects.length,
        favorites: projects.filter(p => favorites.includes(p.guid)).length,
        completed: completed,
        inProgress: inProgress,
        etapasStats: etapasStats
      };
    }

    function showEmpty() {
      document.getElementById('content').innerHTML = `
        <div class="loading">
          <h3>Selecione um subsetor</h3>
          <p>Escolha um subsetor no seletor acima para visualizar o resumo.</p>
        </div>
      `;
    }

    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="loading">
          <h3>Erro</h3>
          <p>${message}</p>
        </div>
      `;
    }

    // Funções para paginação de projetos gerais
    function renderProjectsGrid(projects, page) {
      const startIndex = page * CARDS_PER_PAGE;
      const endIndex = Math.min(startIndex + CARDS_PER_PAGE, projects.length);
      const currentPageProjects = projects.slice(startIndex, endIndex);
      
      // Atualizar botões de navegação
      const prevBtn = document.getElementById('projectsPrevBtn');
      const nextBtn = document.getElementById('projectsNextBtn');
      
      if (prevBtn) prevBtn.disabled = page === 0;
      if (nextBtn) nextBtn.disabled = endIndex >= projects.length;
      
      // Renderizar cards em grade com largura expandida
      return `<div class="cards-grid" style="width: 100%;">
        ${currentPageProjects.map(project => cardTemplate(project)).join('')}
      </div>`;
    }

    function changeProjectsPage(direction) {
      console.log('changeProjectsPage called with direction:', direction);
      console.log('currentProjectsPage:', currentProjectsPage);
      
      const subsetorProjects = allProjects.filter(p => p.subsetor === currentSubsetor);
      const totalPages = Math.ceil(subsectorProjects.length / CARDS_PER_PAGE);
      const newPage = currentProjectsPage + direction;
      
      console.log('subsetorProjects.length:', subsetorProjects.length);
      console.log('CARDS_PER_PAGE:', CARDS_PER_PAGE);
      console.log('totalPages:', totalPages);
      console.log('newPage:', newPage);
      
      if (newPage >= 0 && newPage < totalPages) {
        currentProjectsPage = newPage;
        console.log('Page changed to:', currentProjectsPage);
        
        // Atualizar apenas a seção dos projetos
        const projectsContainer = document.querySelector('#grid');
        if (projectsContainer) {
          projectsContainer.innerHTML = renderProjectsGrid(subsetorProjects, currentProjectsPage);
          console.log('Projects container updated');
        } else {
          console.error('Projects container not found');
        }
        
        // Atualizar botões imediatamente
        const endIndex = (currentProjectsPage + 1) * CARDS_PER_PAGE;
        const prevBtn = document.getElementById('projectsPrevBtn');
        const nextBtn = document.getElementById('projectsNextBtn');
        
        console.log('Buttons found:', !!prevBtn, !!nextBtn);
        console.log('Should disable prev:', currentProjectsPage === 0);
        console.log('Should disable next:', endIndex >= subsetorProjects.length);
        
        if (prevBtn) {
          prevBtn.disabled = currentProjectsPage === 0;
          console.log('Prev button disabled:', prevBtn.disabled);
        }
        if (nextBtn) {
          nextBtn.disabled = endIndex >= subsetorProjects.length;
          console.log('Next button disabled:', nextBtn.disabled);
        }
      } else {
        console.log('Page change not allowed');
      }
    }

    // Funções do Modal
    function openModal(type) {
      if (type !== 'favoritos') {
        alert('Apenas projetos favoritados podem ser visualizados em modal.');
        return;
      }
      
      const subsetorProjects = allProjects.filter(p => p.subsetor === currentSubsetor);
      modalProjects = subsetorProjects.filter(p => favorites.includes(p.guid));
      currentModalPage = 0;
      
      if (modalProjects.length === 0) {
        alert('Nenhum projeto favoritado para exibir no modal.');
        return;
      }
      
      updateModalContent();
      document.getElementById('cardsModal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('cardsModal').style.display = 'none';
    }

    function updateModalContent() {
      const startIndex = currentModalPage * CARDS_PER_PAGE;
      const endIndex = Math.min(startIndex + CARDS_PER_PAGE, modalProjects.length);
      const currentPageProjects = modalProjects.slice(startIndex, endIndex);
      
      // Atualizar título e informações
      const modalTitle = document.getElementById('modalTitle');
      modalTitle.textContent = `Projetos - ${currentSubsetor} (Página ${currentModalPage + 1})`;
      
      const modalInfo = document.getElementById('modalInfo');
      modalInfo.textContent = `Mostrando projetos ${startIndex + 1}-${endIndex} de ${modalProjects.length}`;
      
      // Renderizar cards em grade 3x5
      const cardsContainer = document.getElementById('modalCardsContainer');
      cardsContainer.innerHTML = currentPageProjects.map(project => cardTemplate(project)).join('');
      
      // Atualizar botões de navegação
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      
      prevBtn.disabled = currentModalPage === 0;
      nextBtn.disabled = endIndex >= modalProjects.length;
    }

    function changeModalPage(direction) {
      const totalPages = Math.ceil(modalProjects.length / CARDS_PER_PAGE);
      const newPage = currentModalPage + direction;
      
      if (newPage >= 0 && newPage < totalPages) {
        currentModalPage = newPage;
        updateModalContent();
      }
    }

    // Fechar modal ao clicar fora
    window.onclick = function(event) {
      const modal = document.getElementById('cardsModal');
      if (event.target === modal) {
        closeModal();
      }
    }
    
    // Garantir que os botões de navegação funcionem
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        const prevBtn = document.getElementById('projectsPrevBtn');
        const nextBtn = document.getElementById('projectsNextBtn');
        
        console.log('Botões encontrados:', !!prevBtn, !!nextBtn);
        
        // Adicionar event listeners como backup
        if (prevBtn) {
          prevBtn.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Botão Anterior clicado via listener');
            changeProjectsPage(-1);
          });
        }
        if (nextBtn) {
          nextBtn.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Botão Próximo clicado via listener');
            changeProjectsPage(1);
          });
        }
      }, 1000);
    });

    // Inicializar mini-mapas
    function initMiniMaps() {
      const maps = document.querySelectorAll('.mini-map');
      maps.forEach(el => {
        const lat = parseFloat(el.dataset.lat);
        const lon = parseFloat(el.dataset.lon);
        if (!isNaN(lat) && !isNaN(lon)) {
          const map = L.map(el, {
            center: [lat, lon],
            zoom: 5,
            zoomControl: false,
            attributionControl: false
          });
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
          L.marker([lat, lon]).addTo(map);
          el._leaflet_map = map;
        }
      });
    }

    // Exportar para PDF
    async function exportToPDF() {
      if (!currentSubsetor) {
        alert('Selecione um subsetor primeiro.');
        return;
      }

      const pdf = new window.jspdf.jsPDF({
        orientation: 'landscape',
        unit: 'pt',
        format: 'a4'
      });

      // Adicionar capa
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      
      pdf.setFontSize(24);
      pdf.setTextColor(30, 64, 175);
      pdf.text(`Resumo - ${currentSubsetor}`, pageWidth/2, 60, { align: 'center' });
      
      pdf.setFontSize(14);
      pdf.setTextColor(107, 114, 128);
      pdf.text(`Gerado em ${new Date().toLocaleDateString('pt-BR')}`, pageWidth/2, 85, { align: 'center' });
      
      const subsetorProjects = allProjects.filter(p => p.subsetor === currentSubsetor);
      const favoriteProjects = subsetorProjects.filter(p => favorites.includes(p.guid));
      
      pdf.setFontSize(12);
      pdf.text(`Total: ${subsetorProjects.length} projetos | Favoritos: ${favoriteProjects.length}`, pageWidth/2, 105, { align: 'center' });
      
      pdf.addPage();

      // Capturar conteúdo principal
      const mainContent = document.querySelector('main');
      if (mainContent) {
        const canvas = await window.html2canvas(mainContent, { 
          scale: 1.5, 
          useCORS: true,
          allowTaint: true 
        });
        const imgData = canvas.toDataURL('image/png');
        
        const maxW = pageWidth * 0.9;
        const maxH = pageHeight * 0.9;
        let ratio = Math.min(maxW / canvas.width, maxH / canvas.height);
        let imgWidth = canvas.width * ratio;
        let imgHeight = canvas.height * ratio;
        
        let x = (pageWidth - imgWidth) / 2;
        let y = (pageHeight - imgHeight) / 2;
        
        pdf.addImage(imgData, 'PNG', x, y, imgWidth, imgHeight);
      }

      pdf.save(`resumo-${currentSubsetor.toLowerCase().replace(/\s+/g, '-')}-ppi.pdf`);
    }
  </script>
</body>

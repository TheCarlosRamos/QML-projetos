
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lista de Projetos PPI</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc; color: #1f2937; line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
    header { background: white; border-bottom: 1px solid #e5e7eb; padding: 1.5rem 0; margin-bottom: 2rem; }
    .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .title { display: flex; align-items: center; gap: 0.75rem; }
    .title h1 { font-size: 1.5rem; font-weight: 700; color: #1f2937; }
    .logo { width: 32px; height: 32px; background: #1e40af; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .actions { display: flex; gap: 0.5rem; align-items: center; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-primary { background: #1e40af; color: white; }
    .btn-primary:hover { background: #1e3a8a; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .filters { background: white; padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 2rem; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
    .filter-row { display: grid; grid-template-columns: 1fr auto auto; gap: 1rem; align-items: end; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group label { font-size: 0.875rem; font-weight: 500; color: #374151; }
    .form-group input, .form-group select {
      padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
    }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; padding: 1.25rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #1e40af; margin-bottom: 0.25rem; }
    .stat-label { font-size: 0.875rem; color: #6b7280; }

    .projects-table { background: white; border-radius: 0.75rem; overflow: hidden; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
    .projects-list { padding: 1rem; }
    .project-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem; border-bottom: 1px solid #f3f4f6; transition: background-color 0.2s;
    }
    .project-item:hover { background: #f9fafb; }
    .project-item:last-child { border-bottom: none; }
    .project-info { flex: 1; }
    .project-details { display: flex; gap: 0.75rem; align-items: center; margin-top: 0.5rem; }
    .location { font-size: 0.875rem; color: #6b7280; }
    .favorite-btn {
      width: 32px; height: 32px; border: 2px solid #d1d5db; background: white; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 1rem; margin-left: 1rem;
    }
    .favorite-btn:hover { border-color: #f59e0b; background: #fef3c7; }
    .favorite-btn.active { background: #f59e0b; border-color: #f59e0b; color: white; }
    .project-name { font-weight: 600; color: #1f2937; font-size: 1rem; }
    .sector-badge { background: #e0e7ff; color: #1e40af; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; display: inline-block; }

    .no-results { text-align: center; padding: 3rem; color: #6b7280; }
    .no-results h3 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #374151; }

    .loading { text-align: center; padding: 3rem; color: #6b7280; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top: 3px solid #1e40af; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .filter-row { grid-template-columns: 1fr; }
      .project-item { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .favorite-btn { margin-left: 0; align-self: flex-end; }
      .project-details { flex-wrap: wrap; }
      .project-name { font-size: 0.9rem; }
      .sector-badge { font-size: 0.688rem; padding: 0.188rem 0.5rem; }
      .location { font-size: 0.75rem; }
    }
  </style>
</head>

<body>
  <header>
    <div class="container">
      <div class="header-content">
        <div class="title">
          <div class="logo">PPI</div>
          <h1>Lista de Projetos</h1>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" id="clearBtn">
            <span>🗑️</span> Limpar Favoritos
          </button>
          <button class="btn btn-primary" id="exportBtn" disabled>
            <span>📄</span> Exportar Favoritos (PDF)
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalProjects">–</div>
        <div class="stat-label">Total de Projetos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="visibleProjects">–</div>
        <div class="stat-label">Projetos Visíveis</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="favoriteProjects">0</div>
        <div class="stat-label">Favoritos</div>
      </div>
    </div>

    <div class="filters">
      <div class="filter-row">
        <div class="form-group">
          <label for="searchInput">Pesquisar projetos</label>
          <input type="text" id="searchInput" placeholder="Buscar por nome, descrição, localização...">
        </div>
        <div class="form-group">
          <label for="sectorFilter">Setor</label>
          <select id="sectorFilter">
            <option value="">Todos os setores</option>
          </select>
        </div>
        <div class="form-group">
          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option value="">Todos os status</option>
            <option value="Active">Ativo</option>
            <option value="Inactive">Inativo</option>
          </select>
        </div>
      </div>
    </div>

    <div class="projects-table" id="projectsList">
      <div class="loading">
        <div class="spinner"></div>
        <p>Carregando projetos...</p>
      </div>
    </div>
  </main>

  <script>
    // Estado
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let allProjects = [];

    // Helpers
    const $ = (sel) => document.querySelector(sel);
    const escapeHtml = (text) => {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    };
    const formatCurrency = (value, currency = 'BRL') => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return 'Não informado';
      if (Number(value) === 0) return 'Não informado';
      try {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency }).format(value);
      } catch {
        return `${currency} ${Number(value).toLocaleString('pt-BR')}`;
      }
    };

    // Inicialização
    document.addEventListener('DOMContentLoaded', () => {
      bindUI();
      loadProjects();
    });

    function bindUI() {
      // Filtros
      $('#searchInput').addEventListener('input', filterProjects);
      $('#sectorFilter').addEventListener('change', filterProjects);
      $('#statusFilter').addEventListener('change', filterProjects);

      // Ações
      $('#exportBtn').addEventListener('click', exportFavorites);
      $('#clearBtn').addEventListener('click', clearFavorites);
    }

    async function loadProjects() {
      try {
        // Use a mesma pasta do HTML
        const response = await fetch('./data/projects_full.json');
        allProjects = await response.json();
        populateSectorFilter();
        renderProjects(allProjects);
        updateStats();
      } catch (error) {
        console.error('Erro ao carregar projetos:', error);
        $('#projectsList').innerHTML = `
          <div class="no-results">
            <h3>Erro ao carregar projetos</h3>
            <p>Não foi possível carregar a lista de projetos. Verifique o caminho do arquivo e use um servidor local.</p>
          </div>
        `;
      }
    }

    function populateSectorFilter() {
      const sectorFilter = $('#sectorFilter');
      // Limpa opções extras
      sectorFilter.querySelectorAll('option:not([value=""])').forEach(o => o.remove());

      const sectors = [...new Set(allProjects.map(p => p.setor).filter(Boolean))].sort();
      sectors.forEach(sector => {
        const option = document.createElement('option');
        option.value = sector;
        option.textContent = sector;
        sectorFilter.appendChild(option);
      });
    }

    function renderProjects(projects) {
      const container = $('#projectsList');
      if (!projects || projects.length === 0) {
        container.innerHTML = `
          <div class="no-results">
            <h3>Nenhum projeto encontrado</h3>
            <p>Tente ajustar os filtros ou termos de busca.</p>
          </div>
        `;
        updateStats(0);
        return;
      }

      const items = projects.map(project => {
        const isFavorite = favorites.includes(project.guid);
        const title = project.nome_completo ?? project.nome_projeto ?? 'Projeto sem nome';
        const sector = project.setor ?? 'Sem setor';
        const location = project.localizacoes ?? 'Não informada';
        return `
          <div class="project-item" data-guid="${project.guid}">
            <div class="project-info">
              <div class="project-name">${escapeHtml(title)}</div>
              <div class="project-details">
                <span class="sector-badge">${escapeHtml(sector)}</span>
                <span class="location">${escapeHtml(location)}</span>
              </div>
            </div>
            <button
              class="favorite-btn ${isFavorite ? 'active' : ''}"
              aria-label="${isFavorite ? 'Remover dos favoritos' : 'Adicionar aos favoritos'}"
              title="${isFavorite ? 'Remover dos favoritos' : 'Adicionar aos favoritos'}"
              onclick="toggleFavorite('${project.guid}')"
            >
              ${isFavorite ? '★' : '☆'}
            </button>
          </div>
        `;
      }).join('');

      container.innerHTML = `<div class="projects-list">${items}</div>`;
      updateStats(projects.length);
    }

    function filterProjects() {
      const term = ($('#searchInput').value || '').toLowerCase().trim();
      const sector = $('#sectorFilter').value;
      const status = $('#statusFilter').value;

      const filtered = allProjects.filter(p => {
        const name = (p.nome_completo ?? p.nome_projeto ?? '').toLowerCase();
        const desc = (p.descricao_curta ?? '').toLowerCase();
        const loc  = (p.localizacoes ?? '').toLowerCase();

        const matchesSearch =
          !term ||
          name.includes(term) ||
          desc.includes(term) ||
          loc.includes(term);

        const matchesSector = !sector || (p.setor === sector);
        const matchesStatus = !status || (p.status_atividade === status);

        return matchesSearch && matchesSector && matchesStatus;
      });

      renderProjects(filtered);
      updateStats(filtered.length);
    }

    // Favoritos
    function toggleFavorite(guid) {
      const idx = favorites.indexOf(guid);
      const btn = document.querySelector(`div[data-guid="${guid}"] .favorite-btn`);

      if (idx > -1) {
        favorites.splice(idx, 1);
        if (btn) { btn.classList.remove('active'); btn.textContent = '☆'; }
      } else {
        favorites.push(guid);
        if (btn) { btn.classList.add('active'); btn.textContent = '★'; }
      }

      localStorage.setItem('favorites', JSON.stringify(favorites));
      updateStats();
    }

    function clearFavorites() {
      if (!favorites.length) return;
      if (confirm('Tem certeza que deseja remover todos os favoritos?')) {
        favorites = [];
        localStorage.setItem('favorites', JSON.stringify(favorites));
        document.querySelectorAll('.favorite-btn').forEach(btn => {
          btn.classList.remove('active');
          btn.textContent = '☆';
        });
        updateStats();
      }
    }

    // Estatísticas
    function updateStats(visibleCount = null) {
      $('#totalProjects').textContent = (allProjects.length).toLocaleString('pt-BR');
      $('#visibleProjects').textContent = (visibleCount ?? allProjects.length).toLocaleString('pt-BR');
      $('#favoriteProjects').textContent = favorites.length;

      const exportBtn = $('#exportBtn');
      exportBtn.disabled = favorites.length === 0;
    }

    // Exportar favoritos (abre uma janela com HTML e chama print -> salvar como PDF)
    function exportFavorites() {
      if (!favorites.length) {
        alert('Nenhum projeto favorito selecionado para exportar.');
        return;
      }
      const selected = allProjects.filter(p => favorites.includes(p.guid));

      const projectsHtml = selected.map(project => {
        const title = project.nome_completo ?? project.nome_projeto ?? 'Projeto sem nome';
        const sector = project.setor ?? '—';
        const desc = project.descricao_curta ?? 'Sem descrição disponível';
        const loc  = project.localizacoes ?? 'Não informada';
        const statusAtual = project.status_atual_do_projeto ?? 'Não informado';
        const statusAtiv  = project.status_atividade ?? 'Não informado';
        const custo = formatCurrency(project.custo_estimado, project.moeda);

        return `
          <div class="project">
            <div class="project-title">${escapeHtml(title)}</div>
            <div class="project-sector">${escapeHtml(sector)}</div>
            <div class="project-description">${escapeHtml(desc)}</div>
            <div class="project-meta">
              <div class="meta-item"><strong>Localização:</strong> ${escapeHtml(loc)}</div>
              <div class="meta-item"><strong>Status atual:</strong> ${escapeHtml(statusAtual)}</div>
              <div class="meta-item"><strong>Status da atividade:</strong> ${escapeHtml(statusAtiv)}</div>
              <div class="meta-item"><strong>Custo estimado:</strong> ${escapeHtml(custo)}</div>
            </div>
          </div>
        `;
      }).join('');

      const html = `
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8">
          <title>Projetos Favoritos - PPI</title>
          <style>
            body { font-family: Arial, sans-serif; margin: 20px; }
            .header { text-align: center; margin-bottom: 30px; }
            .project { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #ccc; }
            .project:last-child { border-bottom: none; }
            .project-title { font-size: 18px; font-weight: bold; color: #1e40af; margin-bottom: 10px; }
            .project-sector { background: #e0e7ff; color: #1e40af; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 10px; }
            .project-description { margin-bottom: 15px; line-height: 1.5; }
            .project-meta { font-size: 14px; color: #333; }
            .meta-item { margin-bottom: 5px; }
            .footer { margin-top: 40px; text-align: center; font-size: 12px; color: #999; }
            @page { margin: 20mm; }
          </style>
        </head>
        <body>
          <div class="header">
            <h1>Projetos Favoritos - Programa de Parcerias de Investimentos</h1>
            <p>Gerado em ${new Date().toLocaleDateString('pt-BR')} • ${favorites.length} projeto(s)</p>
          </div>
          ${projectsHtml}
          <div class="footer">
            <p>Documento gerado pelo Sistema PPI</p>
          </div>
        </body>
        </html>
      `;

      const win = window.open('', '_blank');
      if (!win) {
        alert('O navegador bloqueou a janela de exportação. Autorize pop-ups para este site e tente novamente.');
        return;
      }
      win.document.write(html);
      win.document.close();
      setTimeout(() => {
        win.focus();
        win.print();
        setTimeout(() => win.close(), 1000);
      }, 500);
    }

    // Disponibiliza no escopo global
    window.toggleFavorite = toggleFavorite;
  </script>
</body>
</html>
